<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberAegXs Security Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:Inter, sans-serif;
background:#0f172a;
color:white;
}

.sidebar{
background:#020617;
}

.card{
background:#111827;
border:1px solid #1f2937;
}

.glow:hover{
box-shadow:0 0 20px #3b82f6;
transform:translateY(-3px);
transition:0.3s;
}

</style>

</head>

<body>

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="sidebar w-64 p-6">

<h1 class="text-2xl font-bold text-blue-400 mb-10">
🛡 CyberAegXs
</h1>

<nav class="space-y-4">

<a class="flex items-center space-x-3 bg-blue-600 p-3 rounded-lg">
<i data-lucide="layout-dashboard"></i>
<span>Dashboard</span>
</a>

<a class="flex items-center space-x-3 hover:bg-gray-800 p-3 rounded-lg">
<i data-lucide="shield"></i>
<span>Scanner</span>
</a>

<a class="flex items-center space-x-3 hover:bg-gray-800 p-3 rounded-lg">
<i data-lucide="file"></i>
<span>Reports</span>
</a>

<a class="flex items-center space-x-3 hover:bg-gray-800 p-3 rounded-lg">
<i data-lucide="settings"></i>
<span>Settings</span>
</a>

</nav>

</aside>

<!-- MAIN -->

<div class="flex-1">

<!-- HEADER -->

<header class="bg-black/40 backdrop-blur border-b border-gray-800 p-6 flex justify-between items-center">

<h2 class="text-2xl font-bold">Security Dashboard</h2>

<div class="flex items-center space-x-4">

<span class="text-sm text-green-400">Premium User</span>

<div class="w-10 h-10 bg-blue-500 rounded-full"></div>

</div>

</header>

<!-- CONTENT -->

<div class="p-8 space-y-8">

<!-- STATS -->

<div class="grid md:grid-cols-3 gap-6">

<div class="card p-6 rounded-xl glow">
<p class="text-gray-400">Total Scans</p>
<h2 class="text-3xl font-bold text-blue-400">124</h2>
</div>

<div class="card p-6 rounded-xl glow">
<p class="text-gray-400">Threats Blocked</p>
<h2 class="text-3xl font-bold text-red-400">18</h2>
</div>

<div class="card p-6 rounded-xl glow">
<p class="text-gray-400">Clean Files</p>
<h2 class="text-3xl font-bold text-green-400">106</h2>
</div>

</div>

<!-- SCANNER -->

<div class="card p-8 rounded-xl">

<h3 class="text-xl font-bold mb-6">📄 AI Document Scanner</h3>

<input type="file" accept=".pdf" id="pdf-upload" class="hidden" onchange="handleFileUpload(event)">

<label for="pdf-upload"
class="cursor-pointer block border-2 border-dashed border-blue-500 rounded-xl p-10 text-center hover:bg-blue-500/10">

<p class="text-xl font-semibold">Upload PDF to Scan</p>
<p class="text-gray-400 text-sm mt-2">Max Size 10MB</p>

</label>

<div id="scan-result" class="mt-6"></div>

</div>

<!-- REPORT -->

<div class="card p-8 rounded-xl">

<h3 class="text-xl font-bold mb-4">Security Report</h3>

<pre id="report" class="text-gray-300 whitespace-pre-wrap"></pre>

<button onclick="handleDownload()" 
class="mt-6 bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold">

Download Clean File ₹9

</button>

</div>

<!-- TABLE -->

<div class="card p-8 rounded-xl">

<h3 class="text-xl font-bold mb-6">Recent Scans</h3>

<table class="w-full text-left">

<thead class="text-gray-400 border-b border-gray-700">

<tr>
<th class="pb-3">File</th>
<th>Status</th>
<th>Risk</th>
<th>Date</th>
</tr>

</thead>

<tbody id="recent-scans" class="text-sm">

</tbody>

</table>

</div>

</div>
</div>
</div>

<script>

let file=null
let fileUrl=null

const API_KEY="PASTE_YOUR_GEMINI_KEY"

function runLocalScanSimulation(uploadedFile){

const size=uploadedFile.size/(1024*1024)

if(size>5)return"High Risk"
if(size>1)return"Low Risk"

return"Clean"

}

async function handleFileUpload(event){

file=event.target.files[0]

if(!file)return

fileUrl=URL.createObjectURL(file)

const risk=runLocalScanSimulation(file)

document.getElementById("scan-result").innerHTML=
`<p class="mt-4">Local Risk: <b>${risk}</b></p>`

document.getElementById("report").textContent=
"CyberAegXs AI is analyzing the file..."

const reader=new FileReader()

reader.onloadend=async()=>{

const sample=Array.from(new Uint8Array(reader.result))
.slice(0,200)
.map(b=>b.toString(16).padStart(2,'0'))
.join('')

const prompt=`Analyze this PDF security risk: name ${file.name} size ${file.size} sample ${sample}`

const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}
)

const data=await res.json()

const text=data.candidates?.[0]?.content?.parts?.[0]?.text

document.getElementById("report").textContent=text||"Report generation failed"

addRecent(file.name,risk)

}

reader.readAsArrayBuffer(file)

}

function addRecent(name,risk){

const table=document.getElementById("recent-scans")

const row=document.createElement("tr")

row.innerHTML=`
<td class="py-2">${name}</td>
<td>Completed</td>
<td>${risk}</td>
<td>${new Date().toLocaleDateString()}</td>
`

table.prepend(row)

}

function handleDownload(){

if(!fileUrl)return

const options={
key:"rzp_test_RcvLuOBnXYDNYF",
amount:900,
currency:"INR",
name:"CyberAegXs",
description:"Secure File Download",

handler:function(){

const a=document.createElement("a")
a.href=fileUrl
a.download="SAFE_"+file.name
a.click()

alert("Download started!")

}

}

const rzp=new Razorpay(options)
rzp.open()

}

lucide.createIcons()

</script>

</body>
</html>
